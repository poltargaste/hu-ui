name: Release Hysteria Panel

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-size: '20'
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './frontend/package.json'

      - name: Build React Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Go Binaries
        run: |
          # Сборка под Linux amd64
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o hysteria-panel-linux-amd64 .
          
          # Сборка под Linux arm64
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o hysteria-panel-linux-arm64 .

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            hysteria-panel-linux-amd64
            hysteria-panel-linux-arm64
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
